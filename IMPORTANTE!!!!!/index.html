<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="style.css" />
    <!-- link to external stylesheet -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="background">
      <img
        src="../assets/images/lopso_angry.png"
        alt="VERY angry kid"
        class="profile-image"
      />
      <main>
        <h1 class="nombre">Alonso Guajardo (lopso)</h1>
        <h2 class="pais-ciudad">Santiago, Chile</h2>
        <p>"Learning Front-end developer and python."</p>
      </main>
      <nav class="links">
        <div>GitHub</div>
        <div>Frontend Mentor</div>
        <div>LinkedIn</div>
        <div>Twitter(X)</div>
        <div>Instagram</div>
      </nav>
    </div>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Lopzo tumba viejaz</a>.
    </footer>
  </body>
</html>
